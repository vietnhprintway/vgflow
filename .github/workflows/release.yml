# VG Workflow release pipeline (T8 v1.8.0+)
#
# Triggered when a version tag (v*.*.*) is pushed. Builds:
#   1. vgflow-<tag>.tar.gz       — standard release tarball
#   2. vgflow-<tag>.tar.gz.sha256 — checksum for /vg:update verify step
#   3. gate-manifest.json         — T8 hard-gate integrity manifest
#
# All three are uploaded as release assets. `/vg:update` downloads
# gate-manifest.json post-merge to detect logically-broken gates.

name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
        default: "1.8.0"

permissions:
  contents: write  # create release + upload assets

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}"    >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build tarball
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          TAR="vgflow-${TAG}.tar.gz"
          # /vg:update expects release assets to extract into:
          #   .vgflow-cache/<tag>/vgflow/
          rm -rf .release
          mkdir -p .release/vgflow
          tar --exclude='.github' --exclude='.git' --exclude='*.bak' \
              --exclude='.release' --exclude="${TAR}" --exclude="${TAR}.sha256" \
              -cf - . | tar -xf - -C .release/vgflow
          tar -czf "${TAR}" -C .release vgflow
          sha256sum "${TAR}" | awk '{print $1}' > "${TAR}.sha256"
          echo "TAR=${TAR}" >> "$GITHUB_ENV"

      - name: Build gate-manifest.json (T8)
        # Scans commands/vg/*.md for blocks containing `exit 1` OR `⛔ BLOCK`.
        # Each qualifying <step> block is hashed (SHA256) and recorded with a
        # fingerprint (first 80 chars of inner content) for post-merge lookup.
        # vg_update.py is the single source of truth for this heuristic — if
        # it's absent (pre-1.8.0 tag), fall back to a no-op manifest.
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if [ -f "scripts/vg_update.py" ]; then
            python scripts/vg_update.py build-gate-manifest \
              --commands-dir commands/vg \
              --version "${VERSION}" \
              --output gate-manifest.json
          else
            echo "scripts/vg_update.py missing — emitting empty manifest (pre-1.8.0)"
            python -c "import json, datetime, os; json.dump({'version': os.environ['VERSION'], 'generated_at': datetime.datetime.utcnow().isoformat() + 'Z', 'heuristic': 'N/A — vg_update.py not yet present in this release', 'gates': []}, open('gate-manifest.json', 'w'), indent=2)"
          fi
          echo "---"
          echo "gate-manifest.json summary:"
          python -c "import json; d=json.load(open('gate-manifest.json')); print('version:', d['version']); print('gates:', len(d.get('gates', [])))"

      - name: Create GitHub Release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" \
              "${TAR}" \
              "${TAR}.sha256" \
              gate-manifest.json \
              --clobber
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated release. See CHANGELOG for details. Gate-manifest published for /vg:update T8 integrity verification." \
              "${TAR}" \
              "${TAR}.sha256" \
              gate-manifest.json
          fi
