# VG Workflow release pipeline (T8 v1.8.0+)
#
# Triggered when a version tag (v*.*.*) is pushed. Builds:
#   1. vgflow-<tag>.tar.gz       — standard release tarball
#   2. vgflow-<tag>.tar.gz.sha256 — checksum for /vg:update verify step
#   3. gate-manifest.json         — T8 hard-gate integrity manifest
#
# All three are uploaded as release assets. `/vg:update` downloads
# gate-manifest.json post-merge to detect logically-broken gates.

name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
        default: "1.8.0"

permissions:
  contents: write  # create release + upload assets

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}"    >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify codex mirror equivalence (closes P19 process gap from #16)
        # Phase 19 (v2.13.0–v2.15.1) modified canonical commands/vg/{accept,
        # blueprint,build,review}.md without re-running generate-codex-skills.sh.
        # Four release tarballs shipped stale codex-skills/*/SKILL.md mirrors;
        # /vg:sync --verify on standard installs reported drift (#16).
        # This gate fails the release tag at CI time if mirrors are stale —
        # maintainer must regen + commit + retag, no silent ship.
        run: |
          if [ ! -f scripts/verify-codex-mirror-equivalence.py ]; then
            echo "verify-codex-mirror-equivalence.py missing — skipping (pre-2.13.0 tag)"
            exit 0
          fi
          if python scripts/verify-codex-mirror-equivalence.py; then
            echo ""
            echo "✓ codex mirror equivalence: zero functional drift"
          else
            echo ""
            echo "⛔ Codex mirror drift detected — release tarball would ship stale SKILL.md."
            echo ""
            echo "  This usually means commands/vg/*.md changed without a matching"
            echo "  regeneration of codex-skills/. Fix locally:"
            echo ""
            echo "    bash scripts/generate-codex-skills.sh --force"
            echo "    git add codex-skills/"
            echo "    git commit -m \"fix(codex-mirrors): regenerate after canonical drift\""
            echo "    git tag -d ${{ steps.ver.outputs.tag }}                # remove stale local tag"
            echo "    git push origin :refs/tags/${{ steps.ver.outputs.tag }}  # remove remote tag"
            echo "    git tag -a ${{ steps.ver.outputs.tag }} -m \"...\"     # retag on clean commit"
            echo "    git push origin ${{ steps.ver.outputs.tag }}"
            echo ""
            echo "  Background: see issue #16 + CHANGELOG v2.15.2."
            exit 1
          fi

      - name: Build tarball
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          TAR="vgflow-${TAG}.tar.gz"
          # /vg:update expects release assets to extract into:
          #   .vgflow-cache/<tag>/vgflow/
          rm -rf .release
          mkdir -p .release/vgflow
          tar --exclude='.github' --exclude='.git' --exclude='*.bak' \
              --exclude='.release' --exclude="${TAR}" --exclude="${TAR}.sha256" \
              -cf - . | tar -xf - -C .release/vgflow
          tar -czf "${TAR}" -C .release vgflow
          sha256sum "${TAR}" | awk '{print $1}' > "${TAR}.sha256"
          echo "TAR=${TAR}" >> "$GITHUB_ENV"

      - name: Build gate-manifest.json (T8)
        # Scans commands/vg/*.md for blocks containing `exit 1` OR `⛔ BLOCK`.
        # Each qualifying <step> block is hashed (SHA256) and recorded with a
        # fingerprint (first 80 chars of inner content) for post-merge lookup.
        # vg_update.py is the single source of truth for this heuristic — if
        # it's absent (pre-1.8.0 tag), fall back to a no-op manifest.
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if [ -f "scripts/vg_update.py" ]; then
            python scripts/vg_update.py build-gate-manifest \
              --commands-dir commands/vg \
              --version "${VERSION}" \
              --output gate-manifest.json
          else
            echo "scripts/vg_update.py missing — emitting empty manifest (pre-1.8.0)"
            python -c "import json, datetime, os; json.dump({'version': os.environ['VERSION'], 'generated_at': datetime.datetime.utcnow().isoformat() + 'Z', 'heuristic': 'N/A — vg_update.py not yet present in this release', 'gates': []}, open('gate-manifest.json', 'w'), indent=2)"
          fi
          echo "---"
          echo "gate-manifest.json summary:"
          python -c "import json; d=json.load(open('gate-manifest.json')); print('version:', d['version']); print('gates:', len(d.get('gates', [])))"

      - name: Create GitHub Release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" \
              "${TAR}" \
              "${TAR}.sha256" \
              gate-manifest.json \
              --clobber
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes "Automated release. See CHANGELOG for details. Gate-manifest published for /vg:update T8 integrity verification." \
              "${TAR}" \
              "${TAR}.sha256" \
              gate-manifest.json
          fi
