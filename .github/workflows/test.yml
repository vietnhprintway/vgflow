name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  orchestrator:
    name: Orchestrator + validators
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema + pyyaml
        run: pip install jsonschema pyyaml

      - name: Validate JSON schemas
        run: |
          for f in schemas/*.json; do
            python -c "import json; json.loads(open('$f', encoding='utf-8').read()); print('✓ $f')"
          done

      - name: Validate runtime_contract in skill-MDs
        run: |
          # Copy scripts + commands to .claude/ layout so contracts.py finds them
          mkdir -p .claude/commands/vg .claude/schemas .claude/scripts
          cp -r commands/vg/* .claude/commands/vg/
          cp schemas/*.json .claude/schemas/
          cp -r scripts/* .claude/scripts/
          python -c "
          import sys
          sys.path.insert(0, '.claude/scripts/vg-orchestrator')
          import contracts
          fail = False
          for cmd in ['vg:scope', 'vg:blueprint', 'vg:build', 'vg:review', 'vg:test', 'vg:accept']:
              c = contracts.parse(cmd)
              if not c:
                  print(f'✗ {cmd}: missing runtime_contract')
                  fail = True
              else:
                  print(f'✓ {cmd}: {list(c.keys())}')
          sys.exit(1 if fail else 0)
          "

      - name: Validator smoke - compile all, JSON-smoke runnable phase validators
        run: |
          python - <<'PY'
          import ast
          import json
          import py_compile
          import subprocess
          import sys
          from pathlib import Path

          root = Path("scripts/validators")
          failures: list[str] = []

          def cli_flags(call: ast.Call) -> list[str]:
              flags: list[str] = []
              for arg in call.args:
                  if isinstance(arg, ast.Constant) and isinstance(arg.value, str) and arg.value.startswith("--"):
                      flags.append(arg.value)
              return flags

          def is_required(call: ast.Call) -> bool:
              for kw in call.keywords:
                  if kw.arg == "required" and isinstance(kw.value, ast.Constant):
                      return kw.value.value is True
              return False

          def uses_json_contract(path: Path) -> bool:
              text = path.read_text(encoding="utf-8")
              return (
                  "from _common import" in text
                  and "Output" in text
              ) or path.name in {
                  "verify-playwright-mcp-config.py",
              }

          def phase_smokeable(path: Path) -> tuple[bool, str]:
              if not uses_json_contract(path):
                  return False, "not a _common.Output JSON validator"

              tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
              has_phase = False
              required_flags: set[str] = set()
              required_groups: set[str] = set()

              for node in ast.walk(tree):
                  if not isinstance(node, ast.Assign) or not isinstance(node.value, ast.Call):
                      continue
                  func = node.value.func
                  if (
                      isinstance(func, ast.Attribute)
                      and func.attr == "add_mutually_exclusive_group"
                      and is_required(node.value)
                  ):
                      for target in node.targets:
                          if isinstance(target, ast.Name):
                              required_groups.add(target.id)

              for node in ast.walk(tree):
                  if not isinstance(node, ast.Call):
                      continue
                  func = node.func
                  if not isinstance(func, ast.Attribute) or func.attr != "add_argument":
                      continue
                  flags = cli_flags(node)
                  if "--phase" in flags:
                      has_phase = True
                  if is_required(node):
                      required_flags.update(flag for flag in flags if flag != "--phase")
                  if isinstance(func.value, ast.Name) and func.value.id in required_groups:
                      required_flags.update(flags)
              if not has_phase:
                  return False, "no --phase CLI"
              if required_flags:
                  return False, "requires " + ", ".join(sorted(required_flags))
              return True, ""

          for path in sorted(root.glob("*.py")):
              try:
                  py_compile.compile(str(path), doraise=True)
                  print(f"OK compile {path.name}")
              except Exception as exc:
                  failures.append(f"compile {path.name}: {exc}")

              if path.name.startswith("_"):
                  continue

              try:
                  smoke, reason = phase_smokeable(path)
              except SyntaxError as exc:
                  failures.append(f"inspect {path.name}: {exc}")
                  continue
              if not smoke:
                  print(f"- skip JSON {path.stem}: {reason}")
                  continue

              proc = subprocess.run(
                  [sys.executable, str(path), "--phase", "99"],
                  text=True,
                  encoding="utf-8",
                  errors="replace",
                  capture_output=True,
                  check=False,
              )
              payload = proc.stdout.strip()
              try:
                  data = json.loads(payload)
              except Exception as exc:
                  failures.append(
                      f"json {path.stem}: {exc}; rc={proc.returncode}; "
                      f"stdout={payload[:200]!r}; stderr={proc.stderr.strip()[:200]!r}"
                  )
                  continue
              if not isinstance(data, dict) or "validator" not in data or "verdict" not in data:
                  failures.append(f"json {path.stem}: missing validator/verdict keys")
                  continue
              print(f"OK JSON {path.stem}: {data['verdict']}")

          if failures:
              print("\nValidator smoke failures:")
              for failure in failures:
                  print(f"FAIL {failure}")
              raise SystemExit(1)
          PY

      - name: Orchestrator binary loads
        run: |
          mkdir -p .vg
          python .claude/scripts/vg-orchestrator/__main__.py run-status
          python .claude/scripts/vg-orchestrator/__main__.py verify-hash-chain || echo "(no events.db yet — expected)"

      - name: Negative bypass tests (if present)
        run: |
          if [ -f scripts/tests/test_bypass_negative.py ]; then
            cp -r scripts/tests .claude/scripts/
            python .claude/scripts/tests/test_bypass_negative.py
          else
            echo "(no negative tests yet)"
          fi

      - name: Stack health (if present)
        run: |
          if [ -f scripts/vg-stack-health.py ]; then
            # Expected to WARN (no events.db in fresh checkout) but not BLOCK
            python .claude/scripts/vg-stack-health.py && echo "(exit 0 — healthy)" || {
              rc=$?
              [ $rc -eq 1 ] && echo "(exit 1 — WARN, expected in fresh checkout)" || {
                echo "✗ stack health BLOCK"
                exit 1
              }
            }
          fi
