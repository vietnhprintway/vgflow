# Validator Registry — v2.5.2 Phase S
#
# Catalog of every validator in the VG workflow. Used by /vg:validators CLI
# for listing, audit, and drift detection.
#
# Schema per entry:
#   id:             stable ID (filename stem without verify- prefix)
#   path:           repo-relative path
#   severity:       block | warn | advisory
#   phases_active:  list of phases this validator runs in
#   domain:         category (artifact, contract, evidence, security, bootstrap, crossai, orchestrator, test)
#   runtime_target_ms: target p95 runtime (CI perf budget)
#   added_in:       version first shipped
#   description:    one-line what it enforces
#   disabled:       optional — temporary disable with reason + expiry

validators:

  # ──── Phase 0 — Codex mirror sync ────
  - id: codex-skill-mirror-sync
    path: .claude/scripts/validators/verify-codex-skill-mirror-sync.py
    severity: block
    phases_active: [preflight, release]
    domain: sync
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: SHA256 parity between Claude source + codex mirrors (local+global+vgflow-repo)

  # ──── Phase J — Contract coverage ────
  - id: command-contract-coverage
    path: .claude/scripts/validators/verify-command-contract-coverage.py
    severity: block
    phases_active: [all]
    domain: contract
    runtime_target_ms: 3000
    added_in: v2.5.2
    description: Every mutating VG command must declare runtime_contract with must_write + must_emit_telemetry

  # ──── Phase K — Artifact-run binding ────
  - id: artifact-freshness
    path: .claude/scripts/validators/verify-artifact-freshness.py
    severity: block
    phases_active: [17+]
    domain: evidence
    runtime_target_ms: 1500
    added_in: v2.5.2
    description: must_write artifacts must have evidence-manifest entry with creator_run_id matching current run

  # ──── Phase L — Trust-anchor XML ────
  - id: crossai-review-xml
    path: .claude/scripts/validators/validate-crossai-review-xml.py
    severity: block
    phases_active: [blueprint, review, accept]
    domain: crossai
    runtime_target_ms: 500
    added_in: v2.5.2
    description: CrossAI XML must parse + have verdict in pass/flag/block + score 0-10 + reviewer non-empty

  - id: crossai-multi-cli
    path: .claude/scripts/validators/verify-crossai-multi-cli.py
    severity: block
    phases_active: [blueprint, review, accept]
    domain: crossai
    runtime_target_ms: 500
    added_in: v2.5.2
    description: CrossAI consensus requires N CLIs agreeing + reviewer diversity (prevent spoofing)

  # ──── Phase M Batch 1 — Security infra ────
  - id: security-baseline-project
    path: .claude/scripts/validators/verify-security-baseline-project.py
    severity: warn
    phases_active: [accept]
    domain: security
    runtime_target_ms: 30000
    added_in: v2.5.2
    description: Orchestrates runtime security sub-validators (cookie, headers, authz, deps, container)

  - id: cookie-flags-runtime
    path: .claude/scripts/validators/verify-cookie-flags-runtime.py
    severity: warn
    phases_active: [test, accept]
    domain: security
    runtime_target_ms: 5000
    added_in: v2.5.2
    description: Set-Cookie headers must have Secure/HttpOnly/SameSite flags

  - id: security-headers-runtime
    path: .claude/scripts/validators/verify-security-headers-runtime.py
    severity: warn
    phases_active: [test, accept]
    domain: security
    runtime_target_ms: 5000
    added_in: v2.5.2
    description: HSTS/CSP/X-Frame-Options/nosniff required on production endpoints

  - id: authz-negative-paths
    path: .claude/scripts/validators/verify-authz-negative-paths.py
    severity: block
    phases_active: [test, accept]
    domain: security
    runtime_target_ms: 20000
    added_in: v2.5.2
    description: Cross-tenant/cross-role probes must 403/404, never 200

  - id: dependency-vuln-budget
    path: .claude/scripts/validators/verify-dependency-vuln-budget.py
    severity: block
    phases_active: [accept, release]
    domain: security
    runtime_target_ms: 30000
    added_in: v2.5.2
    description: Package CVE counts within budget per severity

  - id: container-hardening
    path: .claude/scripts/validators/verify-container-hardening.py
    severity: warn
    phases_active: [accept]
    domain: security
    runtime_target_ms: 1000
    added_in: v2.5.2
    description: Dockerfile non-root + HEALTHCHECK + pinned tag + compose cap_drop

  # ──── Phase M Batch 2 — Security app-auth ────
  - id: jwt-session-policy
    path: .claude/scripts/validators/verify-jwt-session-policy.py
    severity: block
    phases_active: [review, accept]
    domain: security
    runtime_target_ms: 3000
    added_in: v2.5.2
    description: JWT algorithm RS256/ES256 + access <=15min + refresh <=7d + revocation path

  - id: oauth-pkce-enforcement
    path: .claude/scripts/validators/verify-oauth-pkce-enforcement.py
    severity: block
    phases_active: [review, accept]
    domain: security
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: OAuth public clients must use PKCE S256 + state + nonce (OIDC)

  - id: 2fa-gate
    path: .claude/scripts/validators/verify-2fa-gate.py
    severity: block
    phases_active: [review, accept]
    domain: security
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: Routes requiring 2FA per TEST-GOALS must invoke TOTP/WebAuthn check

  - id: log-hygiene
    path: .claude/scripts/validators/verify-log-hygiene.py
    severity: warn
    phases_active: [review, accept]
    domain: security
    runtime_target_ms: 5000
    added_in: v2.5.2
    description: No Authorization header or password/token fields in logger output

  # ──── Phase N — DAST waive approver ────
  - id: dast-waive-approver
    path: .claude/scripts/validators/verify-dast-waive-approver.py
    severity: block
    phases_active: [accept]
    domain: security
    runtime_target_ms: 1000
    added_in: v2.5.2
    description: Waived DAST findings must have allowlisted approver + non-expired until date + 100+ char reason

  # ──── Phase O — Orchestrator hardening ────
  - id: clean-failure-state
    path: .claude/scripts/validators/verify-clean-failure-state.py
    severity: block
    phases_active: [post-failure]
    domain: orchestrator
    runtime_target_ms: 500
    added_in: v2.5.2
    description: After failed run, no stale locks + no .inflight files + manifest entries consistent

  - id: override-debt-sla
    path: .claude/scripts/validators/verify-override-debt-sla.py
    severity: warn
    phases_active: [release, weekly]
    domain: orchestrator
    runtime_target_ms: 500
    added_in: v2.5.2
    description: Override debt entries past SLA (default 30 days open) surface for resolve

  - id: allow-flag-audit
    path: .claude/scripts/validators/verify-allow-flag-audit.py
    severity: warn
    phases_active: [weekly]
    domain: orchestrator
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: Detect rubber-stamp pattern in --allow-* flag usage (same approver+flag+reason >=3x)

  # ──── Phase P — Bootstrap behavioral ────
  - id: bootstrap-carryforward
    path: .claude/scripts/validators/verify-bootstrap-carryforward.py
    severity: block
    phases_active: [post-run]
    domain: bootstrap
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: Active LEARN-RULES must appear in captured executor prompts (behavioral, not event-grep)

  - id: learn-promotion
    path: .claude/scripts/validators/verify-learn-promotion.py
    severity: block
    phases_active: [post-accept]
    domain: bootstrap
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: Recent Tier-A promotions must appear in first subsequent-run prompts

  # ──── Phase R — Prose-to-PY behavioral ────
  - id: executor-context-scope
    path: .claude/scripts/validators/verify-executor-context-scope.py
    severity: block
    phases_active: [post-build]
    domain: context
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: Prompt D-XX IDs must match task <context-refs> (prevents silent full-mode fallback)

  - id: review-loop-evidence
    path: .claude/scripts/validators/verify-review-loop-evidence.py
    severity: block
    phases_active: [review]
    domain: evidence
    runtime_target_ms: 3000
    added_in: v2.5.2
    description: Consecutive review iterations must show source file delta via git OR explicit no_fix_needed

  - id: test-requirements
