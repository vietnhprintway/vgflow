# Validator Registry — v2.5.2 Phase S
#
# Catalog of every validator in the VG workflow. Used by /vg:validators CLI
# for listing, audit, and drift detection.
#
# Schema per entry:
#   id:             stable ID (filename stem without verify- prefix)
#   path:           repo-relative path
#   severity:       block | warn | advisory
#   phases_active:  list of phases this validator runs in
#   domain:         category (artifact, contract, evidence, security, bootstrap, crossai, orchestrator, test)
#   runtime_target_ms: target p95 runtime (CI perf budget)
#   added_in:       version first shipped
#   description:    one-line what it enforces
#   disabled:       optional — temporary disable with reason + expiry

validators:

  # ──── Phase 0 — Codex mirror sync ────
  - id: codex-skill-mirror-sync
    path: .claude/scripts/validators/verify-codex-skill-mirror-sync.py
    severity: block
    phases_active: [preflight, release]
    domain: sync
    runtime_target_ms: 2000
    added_in: v2.5.2
    description: SHA256 parity between Claude source + codex mirrors (local+global+vgflow-repo)

  # ──── Phase J — Contract coverage ────
  - id: command-contract-coverage
    path: .claude/scripts/validators/verify-command-contract-coverage.py
    severity: block
    phases_active: [all]
    domain: contract
    runtime_target_ms: 3000
    added_in: v2.5.2
    description: Every mutating VG command must declare runtime_contract with must_write + must_emit_telemetry

  # ──── Phase K — Artifact-run binding ────
  - id: artifact-freshness
    path: .claude/scripts/validators/verify-artifact-freshness.py
    severity: block
    phases_active: [17+]
    domain: evidence
    runtime_target_ms: 1500
    added_in: v2.5.2
    description: must_write artifacts must have evidence-manifest entry with creator_run_id matching current run

  # ──── Phase L — Trust-anchor XML ────
  - id: crossai-review-xml
    path: .claude/scripts/validators/validate-crossai-review-xml.py
    severity: block
    phases_active: [blueprint, review, accept]
    domain: crossai
    runtime_target_ms: 500
    added_in: v2.5.2
    description: CrossAI XML must parse + have verdict in pass/flag/block + score 0-10 + reviewer non-empty

  - id: crossai-multi-cli
    path: .claude/scripts/validators/verify-crossai-multi-cli.py
    severity: block
    phases_active: [blueprint, review, accept]
    domain: crossai
    runtime_target_ms: 500
    added_in: v2.5.2
    description: CrossAI consensus requires N CLIs agreeing + reviewer diversity (prevent spoofing)

  # ──── Phase M Batch 1 — Security infra ────
  - id: security-baseline-project
    path: .claude/scripts/validators/verify-security-baseline-project.py
    severity: warn
    phases_active: [accept]
    domain: security
    runtime_target_ms: 30000
    added_in: v2.5.2
    description: Orchestrates runtime security sub-validators (cookie, headers, authz, deps, container)

  - id: cookie-flags-runtime
    path: .claude/scripts/validators/verify-cookie-flags-runtime.py
    severity: warn
    phases_active: [test, accept]
    domain: security
    runtime_target_ms: 5000
    added_in: v2.5.2
    description: Set-Cookie headers must have Secure/HttpOnly/SameSite flags

  - id: security-headers-runtime
    path: .claude/scripts/validators/verify-security-headers-runtime.py
    severity: warn
    phases_active: [test, accept]
    domain: security
